<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Login | BGCGW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <a href="{{ url_for('index') }}" class="login-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <div class="login-card">
        <div class="login-card-glow"></div>
        <div class="login-icon-box">
            <i class="fas fa-user-tie login-role-icon"></i>
        </div>
        <h1 class="login-title">HOD</h1>
        <h2 class="login-subtitle">Login</h2>
        <p class="login-description">Head of Department Portal</p>
        <form class="login-form" action="{{ url_for('hod_login') }}" method="POST">
            <div class="form-group">
                <label><i class="fas fa-envelope form-icon"></i> Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock form-icon"></i> Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            {% if error %}<p style="color:#e74c3c;font-size:0.9rem;margin-bottom:8px;">{{ error }}</p>{% endif %}
            <button type="submit" class="btn-login">Login</button>
            <a href="#" class="login-forgot">Forgot Password?</a>
        </form>
    </div>
</body>
</html>
